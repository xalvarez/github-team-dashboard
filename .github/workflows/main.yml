name: Test

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout git branch
        uses: actions/checkout@v7.0.0
      - name: Install JDK 25
        uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: 25
          cache: gradle
      - name: Run all tests
        run: ./gradlew clean build
